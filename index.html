        .tool-name{font-size:15px;font-weight:600}
        .tool-category{font-size:11px;padding:2px 6px;border-radius:8px;margin-left:auto}
        .tool-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border-color)}

        function renderTools(filter='all',keyword=''){
            const grid=document.getElementById('toolsGrid');
            grid.innerHTML='';
            let filtered=tools;
            if(filter!=='all')filtered=filtered.filter(t=>t.category===filter);
            if(keyword){
                const kw=keyword.toLowerCase();
                filtered=filtered.filter(t=>t.name.toLowerCase().includes(kw)||t.category.toLowerCase().includes(kw));
            }
            filtered.forEach(tool=>{
                const card=document.createElement('div');
                card.className='tool-card';
                card.innerHTML=`<div class="tool-header"><div class="tool-icon" style="background:${tool.color}20;color:${tool.color}">${tool.icon}</div><div class="tool-name">${tool.name}</div><span class="tool-category" style="background:${tool.color}20;color:${tool.color}">${tool.category}</span></div><div class="tool-footer"><a href="${tool.link}" class="tool-btn" target="_blank">下载</a></div>`;
                grid.appendChild(card);
            });
        }
        document.getElementById('searchInput').addEventListener('input',e=>{renderTools(document.querySelector('.cat-btn.active').dataset.cat,e.target.value);});
        document.querySelectorAll('.cat-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderTools(btn.dataset.cat,document.getElementById('searchInput').value);});});
        renderTools();
    </script>
