name: CI_CD Check

on:
  push:
    paths:
      - 'CI_CD/**'
  pull_request:
    paths:
      - 'CI_CD/**'

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './CI_CD'
