name: 容器 Check

on:
  push:
    paths:
      - '容器/**'
  pull_request:
    paths:
      - '容器/**'

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './容器'
