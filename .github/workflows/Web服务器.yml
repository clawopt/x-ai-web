name: Web服务器 Check

on:
  push:
    paths:
      - 'Web服务器/**'
  pull_request:
    paths:
      - 'Web服务器/**'

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './Web服务器'
